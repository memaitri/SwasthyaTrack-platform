name: PDF Reports Test & Artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test --silent
      - name: Generate report fixtures
        run: node server/scripts/generate_report_samples.mjs
      - name: Upload report fixtures
        uses: actions/upload-artifact@v4
        with:
          name: report-fixtures
          path: server/tests/fixtures
